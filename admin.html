<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VistaTour · Panel interno</title>
  <style>
    :root {
      --bg: #0b0d11;
      --surface: #14171d;
      --surface-2: #1b1f27;
      --border: #262b35;
      --text: #e8ecf2;
      --muted: #8a93a1;
      --accent: #6ee7b7;
      --accent-2: #38bdf8;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    a { color: var(--accent-2); text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }
    .hidden { display: none !important; }

    /* Login */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
    .login-card h1 { margin: 0 0 6px; font-size: 22px; }
    .login-card .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .login-card label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 6px; }
    .login-card input { width: 100%; padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; }
    .login-card input:focus { outline: none; border-color: var(--accent); }
    .login-card .btn { width: 100%; margin-top: 20px; padding: 11px; background: var(--accent); color: #0b0d11; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; }
    .login-card .btn:disabled { opacity: 0.5; cursor: wait; }
    .login-card .err { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; }

    /* App shell */
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
    .topbar .brand { font-weight: 700; letter-spacing: 0.3px; }
    .topbar .brand span { color: var(--accent); }
    .topbar .user { color: var(--muted); font-size: 13px; display: flex; gap: 12px; align-items: center; }
    .topbar .logout { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; font-size: 12px; }

    .container { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }
    .page-title { font-size: 22px; margin: 0 0 6px; }
    .page-sub { color: var(--muted); font-size: 14px; margin: 0 0 24px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; margin-bottom: 16px; cursor: pointer; }
    .back-link:hover { color: var(--text); }

    /* Inmobiliarias grid */
    .inmob-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .inmob-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
    .inmob-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .inmob-card .name { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .inmob-card .meta { color: var(--muted); font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
    .inmob-card .count { background: var(--surface-2); padding: 3px 10px; border-radius: 999px; font-size: 12px; color: var(--accent); }

    /* Properties list */
    .prop { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
    .prop-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .prop-title { font-weight: 600; font-size: 15px; }
    .prop-date { color: var(--muted); font-size: 12px; }
    .prop-specs { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 12px; }
    .spec { background: var(--surface-2); border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; font-size: 12px; color: var(--muted); }
    .spec b { color: var(--text); font-weight: 500; }
    .prop-contact { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
    .prop-contact a { color: var(--accent-2); }
    .prop-extra { color: var(--muted); font-size: 13px; font-style: italic; margin-bottom: 10px; }

    /* Gallery */
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 12px; }
    .gal-item { position: relative; aspect-ratio: 4/3; overflow: hidden; border-radius: 8px; background: var(--surface-2); cursor: pointer; border: 1px solid var(--border); }
    .gal-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gal-item .dl { position: absolute; bottom: 6px; right: 6px; background: rgba(11,13,17,0.85); color: var(--text); border: none; border-radius: 6px; padding: 4px 8px; font-size: 11px; opacity: 0; transition: opacity 0.15s; }
    .gal-item:hover .dl { opacity: 1; }

    /* Lightbox */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
    .lightbox.on { display: flex; }
    .lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; }
    .lightbox .close { position: absolute; top: 16px; right: 20px; background: transparent; border: none; color: #fff; font-size: 28px; cursor: pointer; }

    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .dl-all { background: var(--accent-2); color: #0b0d11; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login-wrap">
  <div class="login-card">
    <h1>VistaTour · Panel</h1>
    <div class="sub">Acceso interno Athora</div>
    <form id="login-form">
      <label for="email">Correo</label>
      <input id="email" type="email" required autocomplete="email">
      <label for="password">Contraseña</label>
      <input id="password" type="password" required autocomplete="current-password">
      <button class="btn" id="login-btn" type="submit">Entrar</button>
      <div class="err" id="login-err"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="brand">Vista<span>Tour</span> · Panel</div>
    <div class="user">
      <span id="user-email"></span>
      <button class="logout" id="logout-btn">Salir</button>
    </div>
  </div>

  <div class="container">
    <!-- VIEW: list of inmobiliarias -->
    <div id="view-list">
      <h1 class="page-title">Inmobiliarias</h1>
      <p class="page-sub" id="list-sub">Cargando…</p>
      <div id="inmob-grid" class="inmob-grid"></div>
    </div>

    <!-- VIEW: detail (properties of one inmobiliaria) -->
    <div id="view-detail" class="hidden">
      <div class="back-link" id="back-btn">&larr; Volver a inmobiliarias</div>
      <h1 class="page-title" id="detail-title"></h1>
      <p class="page-sub" id="detail-sub"></p>
      <div id="props-list"></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
  <button class="close" id="lb-close">&times;</button>
  <img id="lb-img" alt="">
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  import { SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY } from './supabase-config.js';

  const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
  window.supabase = supabase;

  // ── Elements
  const $ = (id) => document.getElementById(id);
  const loginView = $('login');
  const appView = $('app');
  const loginForm = $('login-form');
  const loginErr = $('login-err');
  const loginBtn = $('login-btn');
  const userEmailEl = $('user-email');
  const listView = $('view-list');
  const detailView = $('view-detail');
  const listSub = $('list-sub');
  const inmobGrid = $('inmob-grid');
  const backBtn = $('back-btn');
  const detailTitle = $('detail-title');
  const detailSub = $('detail-sub');
  const propsList = $('props-list');
  const lightbox = $('lightbox');
  const lbImg = $('lb-img');

  // ── Auth
  async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) showApp(session.user);
    else showLogin();
  }

  function showLogin() {
    appView.classList.add('hidden');
    loginView.classList.remove('hidden');
  }

  function showApp(user) {
    loginView.classList.add('hidden');
    appView.classList.remove('hidden');
    userEmailEl.textContent = user.email;
    loadInmobiliarias();
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginErr.textContent = '';
    loginBtn.disabled = true;
    const email = $('email').value.trim();
    const password = $('password').value;
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    loginBtn.disabled = false;
    if (error) {
      loginErr.textContent = error.message === 'Invalid login credentials'
        ? 'Correo o contraseña incorrectos.'
        : error.message;
      return;
    }
    showApp(data.user);
  });

  $('logout-btn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    showLogin();
  });

  // ── Data
  async function loadInmobiliarias() {
    listSub.textContent = 'Cargando…';
    inmobGrid.innerHTML = '';
    const { data, error } = await supabase
      .from('leads_inmobiliarias')
      .select('inmobiliaria, created_at')
      .order('created_at', { ascending: false });
    if (error) {
      listSub.textContent = 'Error: ' + error.message;
      return;
    }
    // Group by inmobiliaria
    const map = new Map();
    for (const row of data) {
      const key = row.inmobiliaria || '(sin nombre)';
      if (!map.has(key)) map.set(key, { count: 0, last: row.created_at });
      const entry = map.get(key);
      entry.count++;
      if (new Date(row.created_at) > new Date(entry.last)) entry.last = row.created_at;
    }
    const groups = Array.from(map.entries())
      .map(([name, v]) => ({ name, ...v }))
      .sort((a, b) => new Date(b.last) - new Date(a.last));

    listSub.textContent = `${groups.length} inmobiliarias · ${data.length} propiedades en total`;

    if (groups.length === 0) {
      inmobGrid.innerHTML = '<div class="empty">Aún no hay leads. Cuando alguien envíe el formulario aparecerá aquí.</div>';
      return;
    }

    for (const g of groups) {
      const card = document.createElement('div');
      card.className = 'inmob-card';
      card.innerHTML = `
        <div class="name">${escapeHtml(g.name)}</div>
        <div class="meta">
          <span>${formatDate(g.last)}</span>
          <span class="count">${g.count} ${g.count === 1 ? 'propiedad' : 'propiedades'}</span>
        </div>
      `;
      card.addEventListener('click', () => openDetail(g.name));
      inmobGrid.appendChild(card);
    }
  }

  async function openDetail(inmobiliaria) {
    listView.classList.add('hidden');
    detailView.classList.remove('hidden');
    detailTitle.textContent = inmobiliaria;
    detailSub.textContent = 'Cargando propiedades…';
    propsList.innerHTML = '';

    const { data, error } = await supabase
      .from('leads_inmobiliarias')
      .select('*')
      .eq('inmobiliaria', inmobiliaria)
      .order('created_at', { ascending: false });
    if (error) {
      detailSub.textContent = 'Error: ' + error.message;
      return;
    }
    detailSub.textContent = `${data.length} ${data.length === 1 ? 'propiedad' : 'propiedades'}`;

    for (const prop of data) {
      const card = await renderProp(prop);
      propsList.appendChild(card);
    }
  }

  async function renderProp(prop) {
    const div = document.createElement('div');
    div.className = 'prop';

    const specs = [
      prop.valor_inmueble && ['Valor', prop.valor_inmueble],
      prop.ubicacion && ['Ubicación', prop.ubicacion],
      prop.habitaciones && ['Hab', prop.habitaciones],
      prop.banos && ['Baños', prop.banos],
      prop.area && ['Área', prop.area],
      prop.estrato && ['Estrato', prop.estrato],
      prop.piso && ['Piso', prop.piso],
      prop.garaje && ['Garaje', prop.garaje],
      prop.balcon && ['Balcón', prop.balcon],
      prop.administracion && ['Admin', prop.administracion],
    ].filter(Boolean);

    const caract = (prop.caracteristicas || []).join(', ');

    div.innerHTML = `
      <div class="prop-head">
        <div>
          <div class="prop-title">${escapeHtml(prop.ubicacion || 'Propiedad')} ${prop.valor_inmueble ? '· ' + escapeHtml(prop.valor_inmueble) : ''}</div>
          <div class="prop-contact">
            ${escapeHtml(prop.persona || '')} · <a href="mailto:${escapeHtml(prop.correo)}">${escapeHtml(prop.correo || '')}</a>
          </div>
        </div>
        <div class="prop-date">${formatDate(prop.created_at)}</div>
      </div>
      <div class="prop-specs">
        ${specs.map(([k, v]) => `<div class="spec">${k}: <b>${escapeHtml(String(v))}</b></div>`).join('')}
      </div>
      ${caract ? `<div class="prop-extra">Características: ${escapeHtml(caract)}${prop.caracteristicas_extra ? ' · ' + escapeHtml(prop.caracteristicas_extra) : ''}</div>` : ''}
      ${prop.extra ? `<div class="prop-extra">Nota: ${escapeHtml(prop.extra)}</div>` : ''}
      <div class="gal-head" style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;">
        <div style="color:var(--muted);font-size:13px;">${(prop.image_paths || []).length} fotos</div>
        ${(prop.image_paths || []).length > 0 ? `<button class="dl-all" data-prop-id="${prop.id}">Descargar todas</button>` : ''}
      </div>
      <div class="gallery"></div>
    `;

    const gal = div.querySelector('.gallery');
    const paths = prop.image_paths || [];
    if (paths.length > 0) {
      // Create signed URLs (bucket is private)
      const { data: signed, error: sErr } = await supabase
        .storage.from('inmobiliarias')
        .createSignedUrls(paths, 3600);
      if (sErr) {
        gal.innerHTML = `<div style="color:var(--danger);font-size:13px;">Error cargando fotos: ${sErr.message}</div>`;
      } else {
        signed.forEach((s, i) => {
          if (!s.signedUrl) return;
          const item = document.createElement('div');
          item.className = 'gal-item';
          item.innerHTML = `
            <img src="${s.signedUrl}" alt="foto ${i+1}" loading="lazy">
            <button class="dl">↓</button>
          `;
          item.querySelector('img').addEventListener('click', () => openLightbox(s.signedUrl));
          item.querySelector('.dl').addEventListener('click', (e) => {
            e.stopPropagation();
            downloadUrl(s.signedUrl, paths[i].split('/').pop());
          });
          gal.appendChild(item);
        });

        const dlAllBtn = div.querySelector('.dl-all');
        if (dlAllBtn) {
          dlAllBtn.addEventListener('click', async () => {
            dlAllBtn.disabled = true;
            dlAllBtn.textContent = 'Descargando…';
            for (let i = 0; i < signed.length; i++) {
              const s = signed[i];
              if (s.signedUrl) {
                await downloadUrl(s.signedUrl, paths[i].split('/').pop());
                await new Promise(r => setTimeout(r, 150));
              }
            }
            dlAllBtn.disabled = false;
            dlAllBtn.textContent = 'Descargar todas';
          });
        }
      }
    }

    return div;
  }

  backBtn.addEventListener('click', () => {
    detailView.classList.add('hidden');
    listView.classList.remove('hidden');
    loadInmobiliarias();
  });

  // ── Lightbox
  function openLightbox(url) {
    lbImg.src = url;
    lightbox.classList.add('on');
  }
  $('lb-close').addEventListener('click', () => lightbox.classList.remove('on'));
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('on'); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') lightbox.classList.remove('on'); });

  // ── Utils
  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' }) + ' · ' +
           d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
  }
  async function downloadUrl(url, filename) {
    try {
      const res = await fetch(url);
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename || 'foto.jpg';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    } catch (e) {
      console.error(e);
    }
  }

  // ── Start
  checkSession();
</script>

</body>
</html>
